<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALSL — Espace administration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #1a2e5a; --navy-light: #243d78; --navy-deep: #0f1c3a;
  --gold: #e8a820; --gold-light: #f5c842; --gold-pale: #fef5de;
  --green: #2d9b6e; --green-pale: #e8f7f1;
  --red: #e84040; --red-pale: #fef0f0;
  --orange: #f07030;
  --white: #ffffff;
  --gray-50: #f8f9fb; --gray-100: #eef0f4; --gray-200: #dde1ea;
  --gray-300: #c4cad8; --gray-400: #9aa3b8; --gray-500: #6b7590;
  --gray-600: #4a5270; --gray-700: #333d5c; --gray-800: #1f2740;
  --radius-sm: 6px; --radius: 10px; --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(26,46,90,.08);
  --shadow: 0 4px 16px rgba(26,46,90,.10);
  --shadow-lg: 0 8px 32px rgba(26,46,90,.14);
  --font-sans: 'Inter', system-ui, sans-serif;
  --font-display: 'Sora', 'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--gray-50); color: var(--gray-800); line-height: 1.5; min-height: 100vh; }
h1,h2,h3 { font-family: var(--font-display); font-weight: 700; }
.hidden { display: none !important; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: .5rem; } .gap-3 { gap: .75rem; }
.text-sm { font-size: .85rem; } .text-xs { font-size: .75rem; }
.font-semibold { font-weight: 600; } .font-bold { font-weight: 700; }
.text-navy { color: var(--navy); } .text-green { color: var(--green); }
.text-red { color: var(--red); } .text-gray { color: var(--gray-500); }
.mt-1{margin-top:.25rem;} .mt-2{margin-top:.5rem;} .mt-3{margin-top:.75rem;} .mt-4{margin-top:1rem;} .mt-6{margin-top:1.5rem;}

.btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border-radius: var(--radius-sm); border: none; font-size: .8rem; font-weight: 600; cursor: pointer; transition: .15s; }
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: var(--navy-light); }
.btn-success { background: var(--green); color: white; }
.btn-success:hover { opacity: .9; }
.btn-outline { background: white; color: var(--navy); border: 1.5px solid var(--gray-300); }
.btn-outline:hover { border-color: var(--navy); }
.btn-sm { padding: .35rem .8rem; font-size: .75rem; }

.badge { display: inline-flex; align-items: center; gap: .3rem; padding: .2rem .6rem; border-radius: 20px; font-size: .7rem; font-weight: 700; }
.badge-green { background: var(--green-pale); color: var(--green); }
.badge-red { background: var(--red-pale); color: var(--red); }
.badge-gold { background: var(--gold-pale); color: #8a5e00; }
.badge-navy { background: rgba(26,46,90,.1); color: var(--navy); }
.badge-gray { background: var(--gray-100); color: var(--gray-600); }

.topnav { background: var(--navy); color: white; padding: 0 1.5rem; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,.2); }
.logo-text { font-family: var(--font-display); font-weight: 800; font-size: 1rem; }
.logo-sub { font-size: .68rem; color: rgba(255,255,255,.6); }

.main-wrap { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: white; border-radius: var(--radius-lg); padding: 1.1rem 1.3rem; border: 1px solid var(--gray-100); box-shadow: var(--shadow-sm); }
.stat-label { font-size: .72rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-size: 1.7rem; font-weight: 800; font-family: var(--font-display); margin-top: .2rem; }

.card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-100); box-shadow: var(--shadow-sm); overflow: hidden; }
.card-header { padding: 1rem 1.3rem; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .75rem; }

.filter-bar { display: flex; gap: .6rem; flex-wrap: wrap; padding: 1rem 1.3rem; border-bottom: 1px solid var(--gray-100); background: var(--gray-50); }
.filter-bar select, .filter-bar input { padding: .5rem .8rem; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: .82rem; font-family: var(--font-sans); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .82rem; }
thead { background: var(--gray-50); }
th { padding: .65rem .9rem; text-align: left; font-size: .7rem; font-weight: 700; color: var(--gray-600); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
td { padding: .65rem .9rem; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tr:hover td { background: var(--gray-50); }

.login-wrap { max-width: 380px; margin: 4rem auto; }
.form-input { width: 100%; padding: .65rem .9rem; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: .9rem; margin-bottom: .75rem; }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast-container { position: fixed; top: 76px; right: 1rem; z-index: 300; display: flex; flex-direction: column; gap: .5rem; }
.toast { background: white; border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); padding: .75rem 1rem; max-width: 360px; border-left: 4px solid var(--green); font-size: .82rem; border: 1px solid var(--gray-100); border-left-width: 4px; }
.toast.error { border-left-color: var(--red); }

.modal-overlay { position: fixed; inset: 0; background: rgba(10,18,40,.55); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { padding: 1.2rem; border-bottom: 1px solid var(--gray-100); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 1.2rem; }
.modal-footer { padding: 1rem 1.2rem; border-top: 1px solid var(--gray-100); display: flex; gap: .6rem; justify-content: flex-end; }

@media (max-width: 640px) {
  .main-wrap { padding: 1rem .75rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div>
    <div class="logo-text">ALSL — Administration</div>
    <div class="logo-sub">Suivi des inscriptions 2025/2026</div>
  </div>
  <div id="nav-user" class="text-sm"></div>
</nav>

<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="card">
    <div class="card-header"><h3 class="text-navy">Connexion administration</h3></div>
    <div style="padding:1.3rem;">
      <input type="email" class="form-input" id="login-email" placeholder="Adresse e-mail admin">
      <input type="password" class="form-input" id="login-pwd" placeholder="Mot de passe">
      <button class="btn btn-primary" style="width:100%;justify-content:center;" id="btn-login" onclick="doLogin()">Se connecter</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen" class="main-wrap hidden">

  <div class="stats-grid" id="stats-grid"></div>

  <div class="card">
    <div class="card-header">
      <h3 class="text-navy">Inscriptions</h3>
      <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 Actualiser</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Rechercher un nom..." oninput="renderTable()">
      <select id="filter-statut" onchange="renderTable()">
        <option value="">Tous les statuts</option>
        <option value="soumis">Soumis</option>
        <option value="valide">Validé</option>
        <option value="refuse">Refusé</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Adhérent</th>
            <th>Discipline / Groupe</th>
            <th>Statut</th>
            <th>Paiement</th>
            <th>Montant</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" class="text-gray text-sm" style="text-align:center;padding:2rem;">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="text-navy" id="modal-title">Dossier</h3>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qenyxlvddmnqxcdomius.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jMu9PAZpsbplwxS6sEz-VA_vARu1XL_';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let inscriptionsData = [];

function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast${type==='error'?' error':''}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  if (!email || !pwd) { showToast('Remplissez tous les champs.', 'error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Connexion...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pwd });
  if (error) {
    showToast('Identifiants incorrects.', 'error');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
    return;
  }
  currentUser = data.user;

  // Vérifie le rôle admin
  const { data: profil } = await supabaseClient.from('profils').select('role, prenom, nom').eq('id', currentUser.id).maybeSingle();
  if (!profil || !['admin','responsable_inscriptions'].includes(profil.role)) {
    showToast("Ce compte n'a pas les droits administrateur.", 'error');
    await supabaseClient.auth.signOut();
    btn.disabled = false;
    btn.textContent = 'Se connecter';
    return;
  }

  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('dashboard-screen').classList.remove('hidden');
  document.getElementById('nav-user').textContent = `${profil.prenom || ''} ${profil.nom || ''} — ${profil.role === 'admin' ? '👑 Admin' : '📝 Responsable'}`;
  loadData();
}

async function loadData() {
  document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="text-gray text-sm" style="text-align:center;padding:2rem;">Chargement...</td></tr>';

  const { data, error } = await supabaseClient
    .from('inscriptions')
    .select(`
      id, statut, statut_paiement, mode_paiement, montant_du, nb_cheques, submitted_at, created_at, note_admin,
      adherents ( id, prenom, nom, date_naissance, statut_licencie, tel_urgence, nom_urgence ),
      groupes ( nom, prix, prix_licence, prix_cotisation, disciplines ( nom, icone ) )
    `)
    .order('created_at', { ascending: false });

  if (error) { showToast('Erreur chargement : ' + error.message, 'error'); return; }
  inscriptionsData = data || [];
  renderStats();
  renderTable();
}

function renderStats() {
  const total = inscriptionsData.length;
  const valides = inscriptionsData.filter(i => i.statut === 'valide').length;
  const soumis = inscriptionsData.filter(i => i.statut === 'soumis').length;
  const montantTotal = inscriptionsData.reduce((s,i) => s + (i.montant_du || 0), 0);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total dossiers</div><div class="stat-value text-navy">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Validés</div><div class="stat-value text-green">${valides}</div></div>
    <div class="stat-card"><div class="stat-label">À traiter</div><div class="stat-value" style="color:var(--gold);">${soumis}</div></div>
    <div class="stat-card"><div class="stat-label">Montant total</div><div class="stat-value text-navy">${montantTotal.toFixed(0)} €</div></div>
  `;
}

function renderTable() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filterStatut = document.getElementById('filter-statut').value;

  let filtered = inscriptionsData.filter(i => {
    const adh = i.adherents;
    const matchSearch = !search || (adh && (adh.nom.toLowerCase().includes(search) || adh.prenom.toLowerCase().includes(search)));
    const matchStatut = !filterStatut || i.statut === filterStatut;
    return matchSearch && matchStatut;
  });

  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-gray text-sm" style="text-align:center;padding:2rem;">Aucun dossier trouvé.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(i => {
    const adh = i.adherents;
    const grp = i.groupes;
    const disc = grp?.disciplines;
    const statutBadge = {
      'soumis': '<span class="badge badge-gold">⏳ Soumis</span>',
      'valide': '<span class="badge badge-green">✓ Validé</span>',
      'refuse': '<span class="badge badge-red">✕ Refusé</span>',
      'incomplet': '<span class="badge badge-gold">⏳ Incomplet</span>',
      'brouillon': '<span class="badge badge-gray">Brouillon</span>',
    }[i.statut] || `<span class="badge badge-gray">${i.statut}</span>`;

    const paiementBadge = i.statut_paiement === 'non_paye'
      ? '<span class="badge badge-red">Non payé</span>'
      : '<span class="badge badge-green">Payé</span>';

    const date = i.submitted_at ? new Date(i.submitted_at).toLocaleDateString('fr-FR') : '—';

    return `
      <tr>
        <td><strong>${adh ? adh.prenom + ' ' + adh.nom : '—'}</strong></td>
        <td>${disc?.icone || ''} ${disc?.nom || ''} — ${grp?.nom || ''}</td>
        <td>${statutBadge}</td>
        <td>${paiementBadge} <span class="text-xs text-gray">(${i.mode_paiement || '—'})</span></td>
        <td class="font-semibold">${(i.montant_du || 0).toFixed(2)} €</td>
        <td class="text-xs text-gray">${date}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="openDetail('${i.id}')">👁 Voir</button>
        </td>
      </tr>`;
  }).join('');
}

async function openDetail(id) {
  const insc = inscriptionsData.find(i => i.id === id);
  if (!insc) return;
  const adh = insc.adherents;
  const grp = insc.groupes;
  const disc = grp?.disciplines;

  document.getElementById('modal-title').textContent = `${adh?.prenom} ${adh?.nom}`;

  const certifOublie = adh?.statut_licencie === 'renouvellement' && !adh?.date_dernier_certificat;

  // Charger les documents depuis Supabase
  const { data: docs } = await supabaseClient
    .from('documents')
    .select('*')
    .eq('inscription_id', id);

  const docTypeLabels = {
    'certificat_medical': '📄 Certificat médical',
    'questionnaire_sante': '📋 Questionnaire santé',
    'attestation_questionnaire': '✍️ Attestation questionnaire',
    'photo': '🖼️ Photo identité',
    'autorisation_parentale': '👨‍👩‍👧 Autorisation parentale',
    'autre': '📎 Autre document'
  };

  let docsHtml = '';
  if (docs && docs.length > 0) {
    docsHtml = `
      <div>
        <div class="text-xs font-semibold" style="margin-bottom:.5rem;color:var(--gray-600);text-transform:uppercase;letter-spacing:.05em;">Documents reçus</div>
        <div style="display:flex;flex-direction:column;gap:.4rem;">
          ${docs.map(doc => {
            const label = docTypeLabels[doc.type] || '📎 Document';
            const valideBadge = doc.valide
              ? '<span class="badge badge-green">✓ Validé</span>'
              : '<span class="badge badge-gold">⏳ À vérifier</span>';
            return `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;background:var(--gray-50);border-radius:6px;border:1px solid var(--gray-200);">
                <div style="display:flex;align-items:center;gap:.6rem;">
                  <span class="text-sm">${label}</span>
                  <span class="text-xs text-gray">${doc.fichier_nom || ''}</span>
                </div>
                <div style="display:flex;align-items:center;gap:.5rem;">
                  ${valideBadge}
                  <button class="btn btn-outline btn-sm" onclick="ouvrirDocument('${doc.fichier_url}')">👁 Voir</button>
                  ${!doc.valide ? `<button class="btn btn-success btn-sm" onclick="validerDocument('${doc.id}', this)">✓</button>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  } else {
    docsHtml = `<div style="background:var(--red-pale);border-left:3px solid var(--red);padding:.75rem;border-radius:6px;font-size:.85rem;color:var(--red);">❌ Aucun document reçu pour ce dossier.</div>`;
  }

  document.getElementById('modal-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:.875rem;font-size:.85rem;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">
        <div><strong>Discipline</strong><br>${disc?.icone || ''} ${disc?.nom} — ${grp?.nom}</div>
        <div><strong>Date de naissance</strong><br>${adh?.date_naissance ? new Date(adh.date_naissance).toLocaleDateString('fr-FR') : '—'}</div>
        <div><strong>Statut licencié</strong><br>${adh?.statut_licencie || '—'}</div>
        <div><strong>Contact urgence</strong><br>${adh?.nom_urgence || '—'} — ${adh?.tel_urgence || '—'}</div>
        <div><strong>Paiement</strong><br>${insc.mode_paiement || '—'} ${insc.nb_cheques ? `(${insc.nb_cheques} chèque(s) cotisation + 1 licence)` : ''}</div>
        <div><strong>Montant dû</strong><br><span style="font-weight:700;color:var(--navy);">${(insc.montant_du||0).toFixed(2)} €</span><br><span style="font-size:.75rem;color:var(--gray-500);">Licence ${(grp?.prix_licence||0).toFixed(2)}€ + Cotisation ${(grp?.prix_cotisation||0).toFixed(2)}€</span></div>
      </div>

      ${certifOublie ? `
      <div style="background:#fef5de;border-left:3px solid var(--gold);padding:.75rem;border-radius:6px;">
        ⚠️ <strong>Date du dernier certificat non renseignée</strong> — la famille ne s'en souvient plus.
        <div style="margin-top:.5rem;display:flex;align-items:center;gap:.5rem;">
          <input type="checkbox" id="force-certif" style="width:15px;height:15px;">
          <label for="force-certif" style="font-size:.82rem;cursor:pointer;">✓ Certificat déjà reçu au secrétariat — dispense accordée</label>
        </div>
      </div>` : ''}

      ${docsHtml}

      <div class="form-group">
        <label class="text-xs font-semibold" style="text-transform:uppercase;letter-spacing:.05em;color:var(--gray-600);">Note interne</label>
        <textarea id="modal-note" class="form-input" style="min-height:60px;">${insc.note_admin || ''}</textarea>
      </div>
    </div>`;

  document.getElementById('modal-footer').innerHTML = `
    ${insc.statut !== 'refuse' ? `<button class="btn btn-outline btn-sm" onclick="updateStatut('${id}','refuse')">✕ Refuser</button>` : ''}
    ${insc.statut_paiement === 'non_paye' ? `<button class="btn btn-outline btn-sm" onclick="marquerPaye('${id}')">💰 Marquer payé</button>` : ''}
    <button class="btn btn-outline btn-sm" onclick="saveNote('${id}')">💾 Enregistrer note</button>
    ${insc.statut !== 'valide' ? `<button class="btn btn-success btn-sm" onclick="updateStatut('${id}','valide')">✓ Valider le dossier</button>` : ''}
  `;

  document.getElementById('detailModal').classList.add('open');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}

async function updateStatut(id, statut) {
  const payload = { statut };
  if (statut === 'valide') {
    payload.validated_at = new Date().toISOString();
    payload.validated_by = currentUser.id;
  }
  const { error } = await supabaseClient.from('inscriptions').update(payload).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  showToast(statut === 'valide' ? 'Dossier validé ✓' : 'Dossier refusé', statut === 'valide' ? 'success' : 'error');
  closeModal();
  loadData();
}

async function ouvrirDocument(path) {
  const { data, error } = await supabaseClient.storage
    .from('documents')
    .createSignedUrl(path, 60); // URL valide 60 secondes
  if (error) { showToast('Impossible d\'ouvrir ce document : ' + error.message, 'error'); return; }
  window.open(data.signedUrl, '_blank');
}

async function validerDocument(docId, btn) {
  const { error } = await supabaseClient.from('documents').update({ valide: true }).eq('id', docId);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  btn.remove();
  showToast('Document validé ✓', 'success');
}

async function marquerPaye(id) {
  const { error } = await supabaseClient.from('inscriptions').update({ statut_paiement: 'paye_cb' }).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  showToast('Paiement marqué comme reçu', 'success');
  closeModal();
  loadData();
}

async function saveNote(id) {
  const note = document.getElementById('modal-note').value;
  const { error } = await supabaseClient.from('inscriptions').update({ note_admin: note }).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  showToast('Note enregistrée', 'success');
}

document.getElementById('detailModal').addEventListener('click', (e) => {
  if (e.target.id === 'detailModal') closeModal();
});
</script>
</body>
